<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Lists — KTI SmartCare Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <!-- ── Shell Bar ── -->
  <header class="shell-bar">
    <button class="shell-bar__menu-btn" id="sidebarToggle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
    <a href="/" class="shell-bar__brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2" /><path d="M8 21h8M12 17v4" />
      </svg>
    </a>
    <div class="shell-bar__separator"></div>
    <span class="shell-bar__title">KTI SmartCare Mock</span>
    <div class="shell-bar__actions">
      <div class="shell-bar__avatar">AD</div>
    </div>
  </header>

  <!-- ── Sidebar ── -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar__nav">
      <a href="/" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" /><rect x="3" y="14" width="7" height="7" />
        </svg><span>Dashboard</span>
      </a>
      <a href="/pages/spk.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" /><line x1="9" y1="13" x2="15" y2="13" />
        </svg><span>SPK</span>
      </a>
      <a href="/pages/lembar-kerja.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4" /><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
        </svg><span>Lembar Kerja</span>
      </a>
      <div class="sidebar__divider"></div>
      <a href="/pages/equipment.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" />
        </svg><span>Equipment</span>
      </a>
      <a href="/pages/task-lists.html" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" /><line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" /><line x1="3" y1="18" x2="3.01" y2="18" />
        </svg><span>Task Lists</span>
      </a>
      <a href="/pages/maps.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" />
          <line x1="8" y1="2" x2="8" y2="18" /><line x1="16" y1="6" x2="16" y2="22" />
        </svg><span>Maps</span>
      </a>
      <a href="/pages/users.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" />
        </svg><span>Users</span>
      </a>
      <a href="/pages/equipment-mappings.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 17H7A5 5 0 0 1 7 7h2" /><path d="M15 7h2a5 5 0 0 1 0 10h-2" /><line x1="8" y1="12" x2="16" y2="12" />
        </svg><span>Task Mapping</span>
      </a>
      <div class="sidebar__divider"></div>
      <a href="/pages/submissions.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg><span>Submissions</span>
      </a>
    </div>
  </nav>

  <div class="message-strip" id="messageStrip">
    <span id="messageText"></span>
    <span class="message-strip__close" onclick="hideMessage()">&#x2715;</span>
  </div>

  <!-- ── Main ── -->
  <div class="layout" id="layout">
    <main class="page">
      <div class="page__header">
        <div>
          <div class="page__title">Task Lists</div>
          <div class="page__subtitle">General task list perawatan — daftar aktivitas per kategori</div>
        </div>
        <label class="btn btn-ghost" style="cursor:pointer" title="Import dari Functional Location.xlsx (SAP)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-2px">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Import Excel
          <input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="importTaskListExcel(this)">
        </label>
      </div>

      <!-- filter toolbar -->
      <div class="toolbar" style="margin-bottom:16px">
        <input type="text" id="searchInput" placeholder="Cari task list..."
          oninput="renderTable()"
          style="width:240px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px" />
        <select id="filterCategory" onchange="renderTable()"
          style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px">
          <option value="">Semua Kategori</option>
          <option value="Mekanik">Mekanik</option>
          <option value="Listrik">Listrik</option>
          <option value="Sipil">Sipil</option>
          <option value="Otomasi">Otomasi</option>
        </select>
        <span id="countBadge" style="font-size:12px;color:var(--text-muted)"></span>
      </div>

      <!-- import hint (shown once after first import attempt) -->
      <div id="importHint" style="display:none;background:#fffbeb;border:1px solid #f5d27a;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#7a5500">
      </div>

      <!-- table -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:32px"></th>
              <th>Task List ID</th>
              <th>Nama</th>
              <th>Kategori</th>
              <th>Work Center</th>
              <th>Jumlah Aktivitas</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr class="loading-row"><td colspan="6"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/task-lists.js"></script>
</body>

</html>
