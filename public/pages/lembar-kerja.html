  <div class="shell-bar__separator"></div>
  <span class="shell-bar__title">KTI SmartCare Mock</span>
  <div class="shell-bar__search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" placeholder="Search..."/></div>
  <div class="shell-bar__actions">
    <button class="shell-bar__icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
    <div class="shell-bar__avatar">AD</div>
  </div>
</header>

<nav class="sidebar" id="sidebar">
  <div class="sidebar__nav">
    <a href="/" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
    <a href="/pages/spk.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>SPK</span></a>
    <a href="/pages/lembar-kerja.html" class="nav-item active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Lembar Kerja</span></a>
    <div class="sidebar__divider"></div>
    <a href="/pages/equipment.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg><span>Equipment</span></a>
    <a href="/pages/maps.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg><span>Maps</span></a>
    <a href="/pages/users.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Users</span></a>

    <div class="sidebar__divider"></div>
    <a href="/pages/submissions.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Submissions</span></a>
  </div>
</nav>

<div class="message-strip" id="messageStrip"><span id="messageText"></span><span class="message-strip__close" onclick="hideMessage()">✕</span></div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel__header">
    <span class="panel__title" id="panelTitle">Tambah Lembar Kerja</span>
    <button class="panel__close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel__body" id="panelBody"></div>
  <div class="panel__footer">
    <button class="btn btn-ghost" onclick="closePanel()">Batal</button>
    <button class="btn btn-primary" onclick="saveLk()">Simpan</button>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal" id="detailModal">
  <div class="modal__backdrop" onclick="closeDetailModal()"></div>
  <div class="modal__box">
    <div class="modal__header">
      <span class="modal__title" id="detailTitle">Detail Lembar Kerja</span>
      <button class="modal__close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal__body" id="detailBody"></div>
    <div class="modal__footer"><button class="btn btn-ghost" onclick="closeDetailModal()">Tutup</button></div>
  </div>
</div>

<div class="layout" id="layout">
  <main class="page">
    <div class="page__header">
      <div>
        <div class="page__title">Lembar Kerja</div>
        <div class="page__subtitle">Kelola Work Sheet Preventive Maintenance</div>
      </div>
      <button class="btn btn-primary" onclick="openCreate()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tambah LK
      </button>
    </div>

    <div class="toolbar">
      <select id="filterCategory" onchange="loadLk()">
        <option value="">Semua Kategori</option>
        <option>Mekanik</option><option>Listrik</option><option>Sipil</option><option>Otomasi</option>
      </select>
      <select id="filterStatus" onchange="loadLk()">
        <option value="">Semua Status</option>
        <option value="pending">Pending</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>
      <div class="toolbar__spacer"></div>
      <button class="btn btn-ghost btn-sm" onclick="loadLk()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>LK Number</th><th>Kategori</th><th>Periode</th>
            <th>Status</th><th>Lembar</th><th>SPK</th><th>Aksi</th>
          </tr>
        </thead>
        <tbody id="lkBody">
          <tr class="loading-row"><td colspan="7"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script src="/js/lembar-kerja.js"></script>
</body>
</html>
