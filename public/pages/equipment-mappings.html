<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Mapping — KTI SmartCare Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <!-- ── Shell Bar ─────────────────────────────────────────── -->
  <header class="shell-bar">
    <button class="shell-bar__menu-btn" id="sidebarToggle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
    <a href="/" class="shell-bar__brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2" />
        <path d="M8 21h8M12 17v4" />
      </svg>
    </a>
    <div class="shell-bar__separator"></div>
    <span class="shell-bar__title">KTI SmartCare Mock</span>
    <div class="shell-bar__search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input type="text" placeholder="Search..." />
    </div>
    <div class="shell-bar__actions">
      <button class="shell-bar__icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg></button>
      <div class="shell-bar__avatar">AD</div>
    </div>
  </header>

  <!-- ── Sidebar ── -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar__nav"></div>
  </nav>

  <div class="message-strip" id="messageStrip"><span id="messageText"></span><span class="message-strip__close"
      onclick="hideMessage()">&#x2715;</span></div>

  <!-- ── Overlay + Slide Panel ── -->
  <div class="overlay" id="overlay" onclick="closePanel()"></div>
  <div class="panel" id="panel">
    <div class="panel__header">
      <span class="panel__title" id="panelTitle">Tambah Mapping</span>
      <button class="panel__close" onclick="closePanel()">&#x2715;</button>
    </div>
    <div class="panel__body" id="panelBody"></div>
    <div class="panel__footer">
      <button class="btn btn-ghost" onclick="closePanel()">Batal</button>
      <button class="btn btn-primary" id="panelSave" onclick="handlePanelSave()">Simpan</button>
    </div>
  </div>

  <!-- ── Main ── -->
  <div class="layout" id="layout">
    <main class="page">
      <div class="page__header">
        <div>
          <div class="page__title">Task Mapping</div>
          <div class="page__subtitle">Peta equipment ke task list per interval perawatan</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-secondary" onclick="openBulkByCategory()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M4 6h16M4 10h16M4 14h8"/>
            </svg>
            Bulk per Kategori
          </button>
          <button class="btn btn-secondary" onclick="openBulkCreate()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="2" y="3" width="8" height="6" rx="1"/><rect x="2" y="12" width="8" height="6" rx="1"/>
              <line x1="14" y1="6" x2="22" y2="6"/><line x1="14" y1="15" x2="22" y2="15"/>
            </svg>
            Bulk Manual
          </button>
          <button class="btn btn-primary" onclick="openCreate()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            + Tambah Mapping
          </button>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Equipment</th>
              <th>Interval</th>
              <th>Task List</th>
              <th>Jumlah Aktivitas</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="mappingBody">
            <tr class="loading-row"><td colspan="5"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>

      <!-- ── Task Lists Manager ─────────────────────────────── -->
      <div class="page__header" style="margin-top:32px">
        <div>
          <div class="page__title" style="font-size:18px">Task Lists</div>
          <div class="page__subtitle">Kelola daftar task list yang tersedia — buat task list kustom di sini</div>
        </div>
        <button class="btn btn-secondary" onclick="openCreateTaskList()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          + Task List Baru
        </button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nama Task List</th>
              <th>Kategori</th>
              <th>Jumlah Langkah</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="taskListBody">
            <tr class="loading-row"><td colspan="5"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/equipment-mappings.js"></script>
</body>

</html>
