version: '3.9'

services:
  sap-mock:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kti-sap-mock
    restart: unless-stopped
    ports:
      - "3222:3000"
      - "2222:22"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-kti-mock-secret-dev}
      URI: ${URI:-mysql://root:admin@db:3306/kti_sap}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount the entire application code so it can be edited live via SSH
      - .:/app
      # Ensure node_modules inside container is preserved and not overwritten by host's empty node_modules
      - /app/node_modules
      # Persist uploaded photos across container restarts
      - ./uploads:/app/uploads
    networks:
      - kti-net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/spk", "--header", "Authorization: Bearer invalid" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: mysql:8.0
    container_name: kti-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-admin}
      MYSQL_DATABASE: kti_sap
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
    networks:
      - kti-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

networks:
  kti-net:
    driver: bridge
