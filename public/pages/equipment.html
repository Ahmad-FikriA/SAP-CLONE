<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipment — KTI SmartCare Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <!-- Leaflet.js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <!-- QRCode.js for generating QR codes in popups -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>

<body>
  <header class="shell-bar">
    <button class="shell-bar__menu-btn" id="sidebarToggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg></button>
    <a href="/" class="shell-bar__brand"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2" />
        <path d="M8 21h8M12 17v4" />
      </svg></a>
    <div class="shell-bar__separator"></div>
    <span class="shell-bar__title">KTI SmartCare Mock</span>
    <div class="shell-bar__search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg><input type="text" placeholder="Search..." /></div>
    <div class="shell-bar__actions">
      <button class="shell-bar__icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg></button>
      <div class="shell-bar__avatar">AD</div>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar__nav">
      <a href="/" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg><span>Dashboard</span></a>
      <a href="/pages/spk.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg><span>SPK</span></a>
      <a href="/pages/lembar-kerja.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4" />
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
        </svg><span>Lembar Kerja</span></a>
      <div class="sidebar__divider"></div>
      <a href="/pages/equipment.html" class="nav-item active"><svg width="18" height="18" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" />
        </svg><span>Equipment</span></a>
      <a href="/pages/maps.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
          <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
        </svg><span>Maps</span></a>
      <a href="/pages/users.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
        </svg><span>Users</span></a>
      <div class="sidebar__divider"></div>
      <a href="/pages/submissions.html" class="nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg><span>Submissions</span></a>
    </div>
  </nav>

  <div class="message-strip" id="messageStrip"><span id="messageText"></span><span class="message-strip__close"
      onclick="hideMessage()">✕</span></div>

  <div class="overlay" id="overlay" onclick="closePanel()"></div>
  <div class="panel" id="panel">
    <div class="panel__header">
      <span class="panel__title" id="panelTitle">Tambah Equipment</span>
      <button class="panel__close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel__body" id="panelBody"></div>
    <div class="panel__footer">
      <button class="btn btn-ghost" onclick="closePanel()">Batal</button>
      <button class="btn btn-primary" onclick="saveEquipment()">Simpan</button>
    </div>
  </div>

  <div class="layout" id="layout">
    <main class="page">
      <div class="page__header">
        <div>
          <div class="page__title">Equipment</div>
          <div class="page__subtitle">Kelola data peralatan — PT Krakatau Tirta Industri</div>
        </div>
        <button class="btn btn-primary" onclick="openCreate()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Tambah Equipment
        </button>
      </div>

      <!-- ── Map Section ─────────────────────────────────── -->
      <div class="card map-card">
        <div class="card__header">
          <span class="card__title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              style="vertical-align:-2px;margin-right:6px">
              <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" />
              <line x1="8" y1="2" x2="8" y2="18" />
              <line x1="16" y1="6" x2="16" y2="22" />
            </svg>
            Peta Lokasi Equipment
          </span>
          <div class="map-controls">
            <select id="plantSelector" class="map-plant-select" onchange="switchPlant()">
              <option value="">Loading plants...</option>
            </select>
            <button class="btn btn-ghost btn-sm" onclick="fitMapToMarkers()" title="Lihat semua equipment">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
              </svg>
              Fit All
            </button>
          </div>
        </div>
        <div id="equipmentMap" class="map-container"></div>
        <div class="map-legend">
          <span class="map-legend__item"><span class="map-legend__dot" style="background:#0070D2"></span>Mekanik</span>
          <span class="map-legend__item"><span class="map-legend__dot" style="background:#E67E22"></span>Listrik</span>
          <span class="map-legend__item"><span class="map-legend__dot" style="background:#27AE60"></span>Sipil</span>
          <span class="map-legend__item"><span class="map-legend__dot" style="background:#8E44AD"></span>Otomasi</span>
        </div>
      </div>

      <!-- ── Equipment Table ──────────────────────────────── -->
      <div class="toolbar">
        <input id="searchEquipment" type="text" placeholder="🔍 Cari equipment..." oninput="debouncedSearch()"
          style="width:220px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;" />
        <select id="filterCategory" onchange="currentPage=1;loadEquipment()">
          <option value="">Semua Kategori</option>
          <option>Mekanik</option>
          <option>Listrik</option>
          <option>Sipil</option>
          <option>Otomasi</option>
        </select>
        <select id="filterPlant" onchange="currentPage=1;loadEquipment()">
          <option value="">Semua Plant</option>
        </select>
        <input id="filterFuncLoc" type="text" placeholder="Func. Location..." oninput="debouncedFuncLocSearch()"
          style="width:160px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;" />
        <div class="toolbar__spacer"></div>
        <span id="equipCount" style="font-size:12px;color:var(--text-muted);margin-right:8px;"></span>
        <button class="btn btn-ghost btn-sm" onclick="loadEquipment()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
          Refresh
        </button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Equipment ID</th>
              <th>Nama Equipment</th>
              <th>Lokasi Fungsi</th>
              <th>Kategori</th>
              <th>Plant</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="equipBody">
            <tr class="loading-row">
              <td colspan="6">
                <div class="spinner"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div id="paginationBar"
        style="display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 0;font-size:13px;"></div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/equipment.js"></script>
</body>

</html>
