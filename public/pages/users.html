<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — KTI SmartCare Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <header class="shell-bar">
    <button class="shell-bar__menu-btn" id="sidebarToggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg></button>
    <a href="/" class="shell-bar__brand"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2" />
        <path d="M8 21h8M12 17v4" />
      </svg></a>
    <div class="shell-bar__separator"></div>
    <span class="shell-bar__title">KTI SmartCare Mock</span>
    <div class="shell-bar__search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg><input type="text" placeholder="Search..." /></div>
    <div class="shell-bar__actions">
      <button class="shell-bar__icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg></button>
      <div class="shell-bar__avatar">AD</div>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar__nav"></div>
  </nav>

  <div class="message-strip" id="messageStrip"><span id="messageText"></span><span class="message-strip__close"
      onclick="hideMessage()">✕</span></div>

  <div class="overlay" id="overlay" onclick="closePanel()"></div>
  <div class="panel" id="panel">
    <div class="panel__header">
      <span class="panel__title" id="panelTitle">Tambah User</span>
      <button class="panel__close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel__body" id="panelBody"></div>
    <div class="panel__footer">
      <button class="btn btn-ghost" onclick="closePanel()">Batal</button>
      <button class="btn btn-primary" onclick="saveUser()">Simpan</button>
    </div>
  </div>

  <div class="layout" id="layout">
    <main class="page">
      <div class="page__header">
        <div>
          <div class="page__title">User Management</div>
          <div class="page__subtitle">Kelola akun pengguna aplikasi</div>
        </div>
        <button class="btn btn-primary" onclick="openCreate()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Tambah User
        </button>
      </div>

      <div class="toolbar">
        <select id="filterRole" onchange="loadUsers()">
          <option value="">Semua Role</option>
          <option>teknisi</option>
          <option>planner</option>
          <option>supervisor</option>
          <option>manager</option>
          <option>admin</option>
        </select>
        <div class="toolbar__spacer"></div>
        <button class="btn btn-secondary btn-sm" onclick="exportToExcel()" style="margin-right: 8px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Export Excel
        </button>
        <button class="btn btn-ghost btn-sm" onclick="loadUsers()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
          Refresh
        </button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="col-check"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
              <th>NIK</th>
              <th>Nama</th>
              <th>Jabatan</th>
              <th>Dinas</th>
              <th>Divisi</th>
              <th>Group</th>
              <th>Email</th>
              <th>Password</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr class="loading-row">
              <td colspan="10">
                <div class="spinner"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="bulk-bar" id="bulkBar">
        <span class="bulk-bar__count">0 dipilih</span>
        <button class="btn btn-danger-fill" onclick="bulkDeleteUsers()">Hapus Terpilih</button>
        <button class="btn btn-ghost-light" onclick="document.getElementById('selectAll').click()">Batal</button>
      </div>
    </main>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.18.5/package/dist/xlsx.full.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/users.js"></script>
</body>

</html>
