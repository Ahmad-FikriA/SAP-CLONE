<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import SAP Excel — KTI SmartCare Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* ── Page layout ── */
    .import-page {
      position: fixed;
      top: var(--shell-height);
      left: var(--sidebar-width);
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      transition: left var(--transition);
    }

    .import-page.sidebar-collapsed {
      left: var(--sidebar-collapsed);
    }

    /* Breadcrumb / page header */
    .import-topbar {
      background: #fff;
      border-bottom: 1px solid var(--border-color);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .import-topbar__back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background var(--transition);
    }

    .import-topbar__back:hover {
      background: var(--table-hover);
    }

    .import-topbar__sep {
      color: var(--text-muted);
    }

    .import-topbar__title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-base);
    }

    /* Scrollable body */
    .import-body {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      padding: 24px;
      background: var(--page-bg);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Upload zone ── */
    #uploadZone {
      background: #fff;
      border: 2px dashed var(--border-color);
      border-radius: 10px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition), padding var(--transition);
      flex-shrink: 0;
    }

    #uploadZone.has-file {
      padding: 12px 24px;
    }

    #uploadZone.has-file .upload-zone__icon,
    #uploadZone.has-file .upload-zone__sub {
      display: none;
    }

    #uploadZone:hover,
    #uploadZone.dragover {
      border-color: var(--primary);
      background: #EBF5FB;
    }

    .upload-zone__icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
      line-height: 1;
    }

    #uploadLabel {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-base);
      display: block;
      margin-bottom: 6px;
    }

    .upload-zone__sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Preview section ── */
    #previewSection {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      overflow: hidden;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-color);
      flex-wrap: wrap;
      gap: 8px;
    }

    #previewTitle {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-base);
    }

    #previewStats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .preview-header {
      flex-shrink: 0;
    }

    .preview-table-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    #previewTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    #previewTable thead tr {
      background: #1B3A5C;
      color: #fff;
      text-align: left;
    }

    #previewTable thead th {
      padding: 8px 10px;
      white-space: nowrap;
      font-weight: 600;
    }

    #previewTable tbody tr:nth-child(even) {
      background: #f8f9fa;
    }

    #previewTable tbody tr:hover {
      background: var(--table-hover);
    }

    #previewTable tbody td {
      padding: 7px 10px;
      vertical-align: top;
      border-bottom: 1px solid #f0f0f0;
      font-size: 12px;
      color: var(--text-base);
    }

    /* ── Badge variants ── */
    .stat-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .stat-badge.green {
      background: #e6f4ea;
      color: #1a6e2e;
      border: 1px solid #b7dfbf;
    }

    .stat-badge.amber {
      background: #fef3cd;
      color: #7a5500;
      border: 1px solid #f5d27a;
    }

    .stat-badge.red {
      background: #fdecea;
      color: #9e2a22;
      border: 1px solid #f5b7b3;
    }

    .stat-badge.grey {
      background: #f0f0f0;
      color: var(--text-muted);
      border: 1px solid #d8d8d8;
    }

    /* Resolution badges */
    .res-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .res-badge.res-auto {
      background: #e6f4ea;
      color: #1a6e2e;
      border: 1px solid #b7dfbf;
    }

    .res-badge.res-ambiguous {
      background: #fef3cd;
      color: #7a5500;
      border: 1px solid #f5d27a;
    }

    .res-badge.res-unknown {
      background: #fdecea;
      color: #9e2a22;
      border: 1px solid #f5b7b3;
    }

    .res-badge.res-existing {
      background: #e8eaf6;
      color: #3949ab;
      border: 1px solid #9fa8da;
    }

    /* Compact interval select */
    .interval-select {
      font-size: 11px;
      padding: 2px 6px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: #fff;
      color: var(--text-base);
      cursor: pointer;
      outline: none;
      transition: border-color var(--transition);
    }

    .interval-select:focus {
      border-color: var(--primary);
    }

    /* ── Sticky footer ── */
    .import-footer {
      background: #fff;
      border-top: 1px solid var(--border-color);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 16px;
    }

    .import-footer__info {
      font-size: 13px;
      color: var(--text-muted);
    }

    .import-footer__actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
  </style>
</head>

<body>
  <!-- Shell Bar -->
  <header class="shell-bar">
    <button class="shell-bar__menu-btn" id="sidebarToggle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
    <a href="/" class="shell-bar__brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2" />
        <path d="M8 21h8M12 17v4" />
      </svg>
    </a>
    <div class="shell-bar__separator"></div>
    <span class="shell-bar__title">KTI SmartCare Mock</span>
    <div class="shell-bar__actions">
      <div class="shell-bar__avatar">AD</div>
    </div>
  </header>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar__nav"></div>
  </nav>

  <div class="message-strip" id="messageStrip">
    <span id="messageText"></span>
    <span class="message-strip__close" onclick="hideMessage()">&#x2715;</span>
  </div>

  <!-- Main import page -->
  <div class="import-page" id="layout">

    <!-- Topbar -->
    <div class="import-topbar">
      <a href="/pages/spk.html" class="import-topbar__back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6" />
        </svg>
        Kembali ke SPK
      </a>
      <span class="import-topbar__sep">/</span>
      <span class="import-topbar__title">Import SAP Excel</span>
    </div>

    <!-- Scrollable body -->
    <div class="import-body">

      <!-- Upload zone -->
      <div id="uploadZone" onclick="document.getElementById('fileInput').click()" ondragover="handleDragOver(event)"
        ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
        <span class="upload-zone__icon">&#128194;</span>
        <span id="uploadLabel">Klik atau seret file Excel ke sini</span>
        <span class="upload-zone__sub">.xlsx &mdash; maks 10 MB</span>
        <input type="file" id="fileInput" accept=".xlsx" style="display:none" onchange="handleFileSelect(event)" />
      </div>

      <!-- Preview section (hidden until file is parsed) -->
      <div id="previewSection" style="display:none">
        <div class="preview-header">
          <span id="previewTitle">Preview Data</span>
          <div id="previewStats"></div>
        </div>
        <div class="preview-table-wrap">
          <table id="previewTable">
            <thead>
              <tr>
                <th style="padding:8px 10px;white-space:nowrap">No. Order SAP</th>
                <th style="padding:8px 10px;min-width:200px">Deskripsi</th>
                <th style="padding:8px 10px;white-space:nowrap">Tgl Jadwal</th>
                <th style="padding:8px 10px;min-width:160px">Equipment / Bangunan </th>
                <th style="padding:8px 10px;white-space:nowrap">Kategori</th>
                <th style="padding:8px 10px;white-space:nowrap">Interval</th>
                <th style="padding:8px 10px;min-width:200px">Aktivitas</th>
                <th style="padding:8px 10px;white-space:nowrap">Status</th>
              </tr>
            </thead>
            <tbody id="previewBody"></tbody>
          </table>
        </div>
      </div>

    </div><!-- /.import-body -->

    <!-- Sticky footer -->
    <div class="import-footer">
      <div class="import-footer__info" id="footerInfo">
        <span style="color:var(--text-muted)">Belum ada file dipilih</span>
      </div>
      <div class="import-footer__actions">
        <button class="btn btn-ghost" onclick="resetImport()">Reset</button>
        <button class="btn btn-ghost" id="printBtn" onclick="printPreview()" disabled
          style="display:flex;align-items:center;gap:6px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 6 2 18 2 18 9" />
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
            <rect x="6" y="14" width="12" height="8" />
          </svg>
          Cetak Preview
        </button>
        <button class="btn btn-primary" id="confirmBtn" onclick="confirmImport()" disabled>
          Import SPK
        </button>
      </div>
    </div>

  </div><!-- /.import-page -->

  <script src="/js/app.js"></script>
  <script src="/js/spk-import.js"></script>
</body>

</html>
